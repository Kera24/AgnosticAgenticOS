# Capability Taxonomy (Phase 2 of the Capability Intelligence upgrade).
#
# Provider-neutral, version-controlled, declarative. Capability IDs are
# never coupled to a specific skill/MCP/plugin: `suggested_*` fields are
# hints the Capability Resolver (Phase 5) may or may not use, and a
# capability can be satisfied multiple ways (skill, MCP tool, plugin
# component, deterministic tool, or an agent role's own competence).
#
# `mandatory_conditions` is a small declarative predicate list interpreted
# by the Requirements Intelligence Engine (Phase 3), not evaluated here.
# Supported predicate keys (any one true makes the capability mandatory
# for that predicate; the list itself is OR'd):
#   project_type_in: [project_type, ...]
#   requirement_matches: [regex-or-keyword, ...]   # matched against the
#     project specification's functional requirements / other text
#   capability_present: capability_id               # mandatory once this
#     other capability has already been selected (dependency-driven)
# An empty `mandatory_conditions` list means "never automatically
# mandatory" -- the capability is only added when directly triggered.
#
# Organisation- or project-specific additions/overrides live in
# `.agentic/capabilities/org/*.yaml` (same shape, merged on top of this
# file by id) -- see core/capability/taxonomy.py.

