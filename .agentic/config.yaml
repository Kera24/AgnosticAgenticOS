# Agentic OS configuration.
# Every value here may be overridden by environment variables, e.g.
#   AGENTIC_EXECUTION_MODE=auto
#   AGENTIC_BUDGET_DAILY_LIMIT_USD=10
#   AGENTIC_ROLE_TRIAGE_MODEL=some-model
#   AGENTIC_ROLE_TRIAGE_PROVIDER=ollama
#   AGENTIC_PROVIDER_QWEN_BASE_URL=https://example/v1
# Model names below are PLACEHOLDERS / examples. Assign the models you want;
# the orchestration code never depends on a specific vendor or model.

version: 1

project:
  name: auto            # "auto" = derive from directory name
  repository_root: ..   # relative to .agentic/

execution:
  mode: review          # review | auto  (review: everything becomes a draft or queue item)
  max_tasks_per_run: 1
  max_changed_lines: 400
  max_changed_files: 20
  worktree_enabled: true
  command_timeout_seconds: 900
  goal_timeout_seconds: 60
  # Commands the worker may request via execute_safe_commands. Enforced in code.
  safe_commands: []     # e.g. ["python -m pytest -q", "npm test"]

roles:
  triage:
    provider: openrouter
    model: example/small-triage-model      # placeholder
    fallback_role: triage_fallback
    temperature: 0
    max_output_tokens: 2000
    tools: []

  triage_fallback:
    provider: qwen
    model: example-fallback-model          # placeholder
    temperature: 0
    max_output_tokens: 2000
    tools: []

  conductor:
    provider: anthropic
    model: example-reasoning-model         # placeholder
    fallback_role: conductor_fallback
    temperature: 0
    max_output_tokens: 8000
    tools:
      - read_repository

  conductor_fallback:
    provider: openai
    model: example-reasoning-model         # placeholder
    temperature: 0
    max_output_tokens: 8000
    tools:
      - read_repository

  worker:
    provider: qwen
    model: example-coding-model            # placeholder
    fallback_role: worker_fallback
    temperature: 0
    max_output_tokens: 16000
    tools:
      - read_repository
      - edit_repository
      - execute_safe_commands

  worker_fallback:
    provider: ollama
    model: example-local-model             # placeholder
    temperature: 0
    max_output_tokens: 16000
    tools:
      - read_repository
      - edit_repository
      - execute_safe_commands

  verifier:
    provider: openai
    model: example-verification-model      # placeholder
    fallback_role: verifier_fallback
    temperature: 0
    max_output_tokens: 8000
    tools: []

  verifier_fallback:
    provider: anthropic
    model: example-verification-model      # placeholder
    temperature: 0
    max_output_tokens: 8000
    tools: []

providers:
  openai:
    type: openai
    api_key_env: OPENAI_API_KEY

  anthropic:
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY

  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  qwen:
    type: openai_compatible
    base_url_env: QWEN_BASE_URL
    api_key_env: QWEN_API_KEY

  ollama:
    type: openai_compatible
    base_url: http://localhost:11434/v1
    api_key_required: false
    cost_free: true

  # custom_command example (disabled until you set a command):
  # local_cli:
  #   type: custom_command
  #   command: ["my-model-cli", "--json"]

# Context Broker (ADR 0001): the only component that assembles model input.
# Budgets are hard ceilings; the output reserve is protected before any
# input is selected. Token counts are conservative local ESTIMATES
# (chars/4 * safety_multiplier) unless a provider tokenizer is registered.
context:
  enabled: true
  default_input_budget_tokens: 64000
  reserved_output_tokens: 12000
  safety_multiplier: 1.20
  deduplicate: true
  include_provenance: true

  allocation:                     # optional-content caps, % of input budget
    stable_policy_percent: 10
    task_percent: 15
    code_percent: 35
    memory_percent: 10
    skills_percent: 10
    output_reserve_percent: 20

  overflow:
    strategy: relevance_then_compress
    fail_if_mandatory_content_exceeds_budget: true

  # per-role overrides, e.g.:
  # roles:
  #   coder: {default_input_budget_tokens: 96000}
  roles: {}

  # Code intelligence (ADR 0002). provider: none | native | cce.
  # `cce` requires an installed Code Context Engine CLI; it degrades to
  # `fallback` (then `none`) with the reason reported by doctor/status.
  code_intelligence:
    provider: native
    fallback: none
    index_on_project_start: true
    incremental_after_commit: true
    search_limit: 12
    expansion_limit: 4
    excluded_paths: []          # extra globs, e.g. ["vendor/**"]

# Prompt caching (Phase 8). The broker always renders a stable prefix
# (policy, role contract, schema, project summary) before dynamic content
# and marks the boundary. API adapters use it: Anthropic sends an explicit
# cache_control breakpoint (providers.<name>.cache_enabled/cache_ttl:
# "5m"|"1h"); OpenAI-compatible endpoints rely on automatic exact-prefix
# caching (no fields exist to send). Subscription CLIs: no caching claim is
# ever made — status stays "unknown" and cached tokens are recorded only
# when a provider actually reports them.
caching:
  enabled: true

# OS-owned persistent memory (ADR 0003): durable decisions, outcomes,
# failures and findings — never transcripts, never credentials. Injection is
# compact summaries only, bounded by inject_limit; details load on demand.
memory:
  enabled: true
  retention_days: 180
  inject_limit: 8

# Obsidian-compatible knowledge vault (ADR 0004): human-readable Markdown
# generated deterministically under .agentic/knowledge/. `path: null` means
# the default location. Open it as an Obsidian vault or read it as files.
knowledge:
  enabled: true
  path: null

# Skills registry (ADR 0006). Installation is ALWAYS an explicit admin
# action with a pinned revision; skills are checksummed, reviewed, loaded
# on demand only, and rank below OS policy. Scripts never run unless
# allow_scripts is true AND the skill is reviewed AND the command passes
# the execution allowlist.
skills:
  enabled: true
  auto_install: false
  allow_scripts: false
  max_injected: 2

budget:
  daily_limit_usd: 5
  per_run_limit_usd: 2
  max_input_tokens_per_run: 500000
  max_output_tokens_per_run: 50000
  unknown_price_policy: block      # block | warn | allow
  warning_percentage: 80

# Pricing is deliberately empty: model prices change, so supply your own.
# USD per 1,000,000 tokens. Providers flagged cost_free are always $0.
# pricing:
#   openai:
#     example-verification-model: {input: 2.50, output: 10.00, cached: 1.25}
#   openrouter:
#     default: {input: 1.00, output: 3.00}
pricing: {}

retry:
  maximum_attempts_per_provider: 2
  backoff_seconds: [2, 10]
  allow_fallback: true
  fallback_on_refusal: false

verification:
  # Deterministic checks. "auto" detects from the repository
  # (pytest / npm / cargo / go). Add explicit entries to pin them:
  #   commands:
  #     - {name: tests, command: "python -m pytest -q", mandatory: true}
  commands: auto
  fail_fast: true

trust:
  # Skills listed here may reach the "auto" tier even though the contract
  # marks their area sensitive. Empty by default.
  sensitive_auto_allowed: []
  sensitive_skills: []          # force-mark skills as sensitive
  track_by_model: true

contract:
  # Path patterns whose modification always requires human approval.
  # Extends .agentic/guardrails/protected-paths.txt.
  extra_protected_paths: []

integrations:
  github_cli: auto     # auto | off  (issues/CI context via `gh` when available)

optional_features:
  quorum_triage: false
  metric_ratchets: false
  sparring: false
  weekly_compost: false
  notifications: false

# =============================================================================
# FULL-PROJECT BUILD (hybrid CLI / local / API). Machine-specific choices
# belong in .agentic/config.machine.yaml (git-ignored, written by `run setup`).
# =============================================================================

# Backends unify all invocation types behind one interface.
#   type: cli            authenticated subscription CLIs (auth stays with the
#                        CLI itself; tokens are never read or copied)
#   type: local          Ollama and compatible local runtimes (cost-free)
#   type: api            the providers section above (pricing/budget applies)
#   type: custom_command the existing custom command adapter
backends:
  codex:
    type: cli
    kind: codex
    binary: codex
    auth_probe_args: [login, status]
    ephemeral: true
  claude:
    type: cli
    kind: configured
    binary: claude
    version_args: ["--version"]
    invoke_args: ["-p", "--output-format", "json"]
    write_args: ["--permission-mode", "acceptEdits"]
    prompt_via: stdin
    parse: auto
  qwen:
    type: cli
    kind: configured
    binary: qwen
    version_args: ["--version"]
    invoke_args: ["-p"]
    prompt_via: stdin
    parse: auto
  ollama:
    type: local
    model: null              # selected during setup from installed models
    api_key_required: false
    cost_free: true
  # API backends reference the providers section; enable by assigning a model:
  # openai_api:  {type: api, provider: openai, model: your-model}
  # claude_api:  {type: api, provider: anthropic, model: your-model}
  # qwen_api:    {type: api, provider: qwen, model: your-model}
  # openrouter_api: {type: api, provider: openrouter, model: vendor/model}

routing:
  mode: simple               # simple | per_agent | capability
  primary: null              # set by `run setup` or --primary
  fallbacks: []
  per_agent: {}              # architect/conductor/coder/qa/security overrides

  # Policies apply to capability mode (and are honest defaults elsewhere).
  policies:
    reviewer_different_from_worker: false
    no_fallback_on_auth_failure: true    # enforced in code regardless
    no_fallback_on_refusal: true         # enforced in code regardless
    allow_local_fallback: true

  # Capability mode: roles declare required capabilities and (optionally)
  # ordered preferences. Backends may declare capabilities/context_window
  # in the backends: section. Model names below are EXAMPLES — used only
  # if that backend is actually installed and authenticated.
  # agents:
  #   architect:
  #     capabilities: {reasoning: highest, long_running: true}
  #     preferred:
  #       - {backend: claude, model: auto}
  #       - {backend: codex, model: auto}
  #   coder:
  #     capabilities: {coding: high}
  #     preferred:
  #       - {backend: codex, model: auto}
  #       - {backend: claude, model: auto}
  #       - {backend: ollama, model: auto}
  #   qa:
  #     independent_from: coder
  #     capabilities: {reasoning: high, review: high}
  agents: {}

interaction:
  mode: completion_only      # cycle_review | milestone_review | completion_only

notifications:
  desktop: true

cycle:
  maximum_tasks: 1
  target_duration_minutes: 20
  maximum_duration_minutes: 30
  maximum_repair_attempts: 3
  maximum_replans_per_task: 2
  maximum_review_rounds: 2     # model-review repair rounds before escalation

cooling:
  after_success_minutes: 30
  after_failure_minutes: 30
  minimum_minutes: 5
  maximum_minutes: 360
  adaptive: true

repair:
  maximum_attempts_per_task: 3
  maximum_replans_per_task: 2
  on_exhaustion: block_task_and_continue
  continue_independent_tasks: true

capacity:
  safety_multiplier: 1.35    # clamped to [1.0, 3.0]
  # role_tokens: {conductor: 6000, coder: 20000, qa: 8000, security: 8000}

# Self-imposed local limits. null = not configured; provider limits are
# NEVER invented — these only add local ceilings you choose.
limits:
  codex:
    maximum_calls_per_hour: null
    maximum_calls_per_day: null
    maximum_estimated_tokens_per_hour: null
    maximum_estimated_tokens_per_day: null
  claude:
    maximum_calls_per_hour: null
    maximum_calls_per_day: null
  qwen:
    maximum_calls_per_hour: null
    maximum_calls_per_day: null
  ollama:
    maximum_parallel_calls: 1

scheduler:
  enabled: true
  cycle:
    target_duration_minutes: 20
    maximum_duration_minutes: 30
    maximum_tasks: 1
  cooling:
    after_success_minutes: 30
    after_failure_minutes: 30
    minimum_minutes: 5
    maximum_minutes: 360
  continuation:
    automatic: true
    resume_after_restart: true
    stop_when_project_complete: true
  operating_window:
    enabled: false
    timezone: Australia/Sydney
    start: "07:00"
    stop: "22:00"
